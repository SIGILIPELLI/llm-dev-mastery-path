site_name: LLM Development Mastery Path
site_description: A structured, module-wise training program for building applications with Large Language Models — prompt engineering, LLM APIs, tool calling, agents, and evaluation — from entry level to master level.
site_url: https://sigilipelli.github.io/llm-dev-mastery-path/
repo_url: https://github.com/SIGILIPELLI/llm-dev-mastery-path
repo_name: llm-dev-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · The LLM Landscape & Setup": level-1/01-llm-landscape-setup.md
      - "02 · API Fundamentals": level-1/02-api-fundamentals.md
      - "03 · Prompt Engineering": level-1/03-prompt-engineering.md
      - "04 · Structured Output": level-1/04-structured-output.md
      - "05 · Tool / Function Calling": level-1/05-tool-calling.md
      - "06 · Conversation State & Memory": level-1/06-conversation-state-memory.md
      - "07 · Streaming": level-1/07-streaming.md
      - "08 · Errors, Rate Limits & Cost": level-1/08-errors-rate-limits-cost.md
      - "09 · A Simple Agent Loop": level-1/09-simple-agent-loop.md
      - "10 · Capstone — CLI Personal Assistant": level-1/10-capstone-project.md
  - "Level 2 · Intermediate":
      - Overview: level-2/index.md
      - "01 · Advanced Prompting Patterns": level-2/01-advanced-prompting-patterns.md
